<div class="container">
  <h1>Create Job</h1>
  <form [formGroup]="form" (ngSubmit)="createJob()">
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" formControlName="title" required>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" formControlName="description" required></textarea>
    </div>
    <div class="form-group">
      <label for="budget">Budget</label>
      <input type="number" id="budget" name="budget" formControlName="budget" required>
    </div>
    <div class="form-group">
      <label for="category">Category</label>
      <input type="text" id="category" name="category" formControlName="category" required>
    </div>
    <button type="submit">Create Job</button>
  </form>
</div>
